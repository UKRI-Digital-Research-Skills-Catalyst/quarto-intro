    icon:
      path: images/logo_transparent_background.png
      alt: UKRI Digital Research Skills Catalyst logo
  small: images/logo_transparent_background.png

color:
  palette:
    strong-white: "#FFFFFF"
    york-navy:   "#2E2D62"
