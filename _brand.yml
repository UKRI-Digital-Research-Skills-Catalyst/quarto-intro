meta:
  name: UKRI Digital Research Skills Catalyst
  author: Emma Rand
  link:
    home: https://digitalskillscatalyst.ac.uk/
    
logo:
  images:
    icon:
      path: images/logo_no_text_transparent.png
      alt: UKRI Digital Research Skills Catalyst logo
  small: images/logo_no_text_transparent.png

color:
